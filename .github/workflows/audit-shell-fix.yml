name: Apply audited shell parser fix

on:
  push:
    branches: [fix/audit-shell-parser]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/audit-shell-parser

      - name: Correct CSV and JSON escaping
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/certificate_tls_health.sh')
          text = path.read_text(encoding='utf-8')
          old_csv = r'value="${value//"/""}"'
          new_csv = r'value="${value//\"/\"\"}"'
          if old_csv not in text:
              raise SystemExit('Expected malformed CSV escaping was not found')
          text = text.replace(old_csv, new_csv, 1)
          marker = 'cat > "$JSON" <<EOF'
          escaped = r'''VERIFY_JSON="${VERIFY_CODE//\\/\\\\}"
          VERIFY_JSON="${VERIFY_JSON//\"/\\\"}"

          cat > "$JSON" <<EOF'''
          if marker not in text:
              raise SystemExit('JSON heredoc marker was not found')
          text = text.replace(marker, escaped, 1)
          old_json = r'  "verification_result": "${VERIFY_CODE//"/\\"}",'
          new_json = '  "verification_result": "$VERIFY_JSON",'
          if old_json not in text:
              raise SystemExit('Expected malformed JSON escaping was not found')
          text = text.replace(old_json, new_json, 1)
          path.write_text(text, encoding='utf-8')
          PY
          bash -n src/certificate_tls_health.sh
          shellcheck -S error src/certificate_tls_health.sh

      - name: Commit validated fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/certificate_tls_health.sh
          git rm .github/workflows/audit-shell-fix.yml
          git commit -m "fix: correct certificate report escaping"
          git push origin HEAD:${GITHUB_REF_NAME}
